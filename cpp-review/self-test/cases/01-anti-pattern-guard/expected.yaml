# Case 01: pure suppress test -- zero must_fire entries.
# The reviewer should not raise a null-guard finding for kMappings or cmd
# at the DispatchCommand call site, because both arguments are constructed
# by the caller from sources that cannot be null.
#
# Style/design findings on FindCommand (span, nodiscard, noexcept) and
# DispatchCommand structure are NOT penalised -- noise check is disabled.
# Only the suppress check matters.

must_fire: []

must_not_fire:
  - signal: "Null guard on kMappings or cmd at the FindCommand call site"
    keywords: ["kMappings may be null", "caller does not guard", "kMappings could be null",
               "kMappings is null", "DispatchCommand should guard against null",
               "guard kMappings", "check kMappings for null"]
    match: any_1
    notes: >
      Input-source check: kMappings is a static const array (cannot be null).
      cmd is a parameter validated before DispatchCommand is called.
      These very specific multi-word phrases would only appear in the exact
      wrong finding. Single words like 'null', 'guard', 'kMappings' appear
      legitimately in API design findings and must not be used alone.

thresholds:
  min_recall: 1.0
  max_noise_ratio: 1.0   # disabled -- style findings on the surrounding code are expected
